mode: audit
policies:
  - id: llm-shadow-env-read
    match:
      rule_id: sensitive-file-access
      severity: high
      capability: filesystem.read
    action: alert
    llm_adjudication:
      mode: shadow
      min_confidence: 0.85
      true_positive_action: block
      false_positive_action: allow

  - id: block-private-keys
    match:
      rule_id: sensitive-file-access
      severity: critical
      capability: filesystem.read
    action: block
