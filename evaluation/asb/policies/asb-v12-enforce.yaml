mode: enforce
agent_input_gate:
  mode: enforce
  review: hybrid
  min_confidence: 0.85
  true_positive_action: block
  false_positive_action: allow
tool_metadata_gate:
  mode: enforce
  review: hybrid
  min_confidence: 0.85
  true_positive_action: block
  false_positive_action: allow
tool_request_gate:
  mode: enforce
  review: hybrid
  min_confidence: 0.85
  true_positive_action: block
  false_positive_action: allow
session_guard:
  mode: enforce
  compromised_action: block
policies:
  - id: asb-block-critical
    match:
      severity: critical
    action: block
  - id: asb-block-high
    match:
      severity: high
    action: block
